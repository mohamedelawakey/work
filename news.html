<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الأخبار - كنوز الغربية</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- FontAwesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="investigations.css" />
  </head>
  <body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="investigations-page">
      <div class="container">
        <h1 class="page-title">
          <span>•</span> الأخبار <span>•</span>
        </h1>

        <div class="investigations-grid" id="news-grid">
          <!-- Dynamically filled by JavaScript -->
        </div>

        <div class="pagination" id="news-pagination">
          <!-- Dynamically filled by JavaScript -->
        </div>
      </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script>
      const CARDS_PER_PAGE = 4;
      let currentPage = 1;

      const news = [
        {
          title: "\"من الخشب إلى البلاستيك\".. سر اختفاء \"الأقفاص التقليدية\" من أسواق المحلة",
          link: "report_vegetable_cages.html",
          img: "imgs/6d057ded605c140c6975a7c8a2d67083014a1d8e.png",
          author: "الطالب/ سما أسامة",
          date: "16 يناير 2026",
          desc: "أسباب التوجه نحو \"الأقفاص البلاستيكية\" لصالح أصحاب المحلات لما لها من كفاءة وتقليل خسائر التلف في الخضروات"
        },
        {
          title: "\"قرية الحداد\".. كيف تحولت بيوت الغربية إلى قلعة لصناعة الشنط الحريمي؟",
          link: "report_hadad_bags.html",
          img: "imgs/3ec950cab9da3afd8db068efebf4288c56ec3295(1).png",
          author: "الطالب/ سما أسامة",
          date: "16 يناير 2026",
          desc: "ورغم شهرتها التي تمتد لـ 60 عاماً، يواجه صناع \"الحداد\" تحديات ارتفاع أسعار الخامات وغياب التسهيلات التسويقية والتمويلية."
        },
        {
          title: "\"الذهب الأصفر\" في شبراملس.. حرفة الأجداد تواجه تحديات البقاء",
          link: "report_shabramalas_flax.html",
          img: "imgs/flax_harvest.png",
          author: "الطالب/ نورهان محمد",
          date: "16 يناير 2026",
          desc: "مزارعو الكتان في الغربية يطالبون بالميكنة ودعم التصنيع المحلي لإنقاذ المحصول من الاعتماد على التصدير الخام"
        },
        {
          title: "ارتفاع تكاليف الإنتاج يضع صناعة الفخار بالفرستق تحت الضغط",
          link: "report_pottery_costs.html",
          img: "imgs/4d9a29cfe3c0cadd432ce97e4ebff6694784f656(2).png",
          author: "الطالب/ شيماء عصام محمد عبد الباري قسم",
          date: "16 يناير 2026",
          desc: "تشهد صناعة الفخار بقرية الفرستق ضغوطاً متزايدة في الفترة الأخيرة.."
        }
      ];

      function getPageFromHash() {
        const hash = window.location.hash;
        const match = hash.match(/#page-(\d+)/);
        return match ? parseInt(match[1], 10) : 1;
      }

      function renderNews(page) {
        const container = document.getElementById("news-grid");
        if (!container) return;

        container.innerHTML = "";

        const startIndex = (page - 1) * CARDS_PER_PAGE;
        const endIndex = Math.min(startIndex + CARDS_PER_PAGE, news.length);
        const pageNews = news.slice(startIndex, endIndex);

        pageNews.forEach(item => {
          const cardHtml = `
            <a href="${item.link}" class="investigation-card">
              <img src="${item.img}" alt="${item.title}" />
              <div class="investigation-overlay">
                <h2>${item.title}</h2>
                <p>${item.desc}</p>
                <div class="investigation-meta">
                  <span class="author"><i class="fa-solid fa-user"></i> ${item.author}</span>
                  <time datetime="${item.date}">${item.date}</time>
                </div>
              </div>
            </a>
          `;
          container.insertAdjacentHTML("beforeend", cardHtml);
        });
      }

      function renderPagination(page) {
        const container = document.getElementById("news-pagination");
        if (!container) return;

        container.innerHTML = "";

        const totalPages = Math.ceil(news.length / CARDS_PER_PAGE);
        if (totalPages < 1) return;

        // Previous button (Right arrow in RTL)
        const prevBtn = document.createElement("button");
        prevBtn.className = `page-btn ${page === 1 ? 'disabled' : ''}`;
        prevBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
        prevBtn.addEventListener("click", () => {
          if (page > 1) {
            goToPage(page - 1);
          }
        });
        container.appendChild(prevBtn);

        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
          const pageNum = document.createElement("button");
          pageNum.className = `page-num ${i === page ? 'active' : ''}`;
          pageNum.innerText = i;
          pageNum.addEventListener("click", () => {
            goToPage(i);
          });
          container.appendChild(pageNum);
        }

        // Next button (Left arrow in RTL)
        const nextBtn = document.createElement("button");
        nextBtn.className = `page-btn ${page === totalPages ? 'disabled' : ''}`;
        nextBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
        nextBtn.addEventListener("click", () => {
          if (page < totalPages) {
            goToPage(page + 1);
          }
        });
        container.appendChild(nextBtn);
      }

      function goToPage(page) {
        currentPage = page;
        window.location.hash = `page-${page}`;
        renderNews(page);
        renderPagination(page);

        // Scroll to top of grid
        window.scrollTo({
          top: document.querySelector(".investigations-page").offsetTop - 40,
          behavior: "smooth"
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderComponents("nav-news");

        const initialPage = getPageFromHash();
        const totalPages = Math.ceil(news.length / CARDS_PER_PAGE);
        currentPage = initialPage >= 1 && initialPage <= totalPages ? initialPage : 1;

        renderNews(currentPage);
        renderPagination(currentPage);

        window.addEventListener("hashchange", () => {
          const page = getPageFromHash();
          if (page !== currentPage && page >= 1 && page <= totalPages) {
            currentPage = page;
            renderNews(page);
            renderPagination(page);
          }
        });
      });
    </script>
  </body>
</html>
