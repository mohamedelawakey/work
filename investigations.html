      function getPageFromHash() {
        const hash = window.location.hash;
        const match = hash.match(/#page-(\d+)/);
        return match ? parseInt(match[1]) : 1;
      }

      function renderInvestigations(page) {
        const container = document.getElementById("investigations-grid");
        if (!container) return;

        container.innerHTML = "";

        const start = (page - 1) * CARDS_PER_PAGE;
        const end = start + CARDS_PER_PAGE;
        const paginatedItems = investigations.slice(start, end);

        paginatedItems.forEach(item => {
          const cardHtml = `
            <a href="${item.link}" class="investigation-card">
              <img src="${item.img}" alt="${item.title}" />
              <div class="investigation-overlay">
                <h2>${item.title}</h2>
                <p>${item.desc}</p>
                <div class="investigation-meta">
                  <span class="author"><i class="fa-solid fa-user"></i> ${item.author}</span>
                  <time datetime="${item.date}">${item.date}</time>
                </div>
              </div>
            </a>
          `;
          container.insertAdjacentHTML("beforeend", cardHtml);
        });
      }

      function renderPagination(page) {
        const container = document.getElementById("investigations-pagination");
        if (!container) return;

        container.innerHTML = "";

        const totalPages = Math.ceil(investigations.length / CARDS_PER_PAGE);
        if (totalPages <= 1) return;

        // Previous button (Right arrow in RTL)
        const prevBtn = document.createElement("button");
        prevBtn.className = `page-btn ${page === 1 ? 'disabled' : ''}`;
        prevBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
        prevBtn.addEventListener("click", () => {
          if (page > 1) {
            goToPage(page - 1);
          }
        });
        container.appendChild(prevBtn);

        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
          const pageNum = document.createElement("button");
          pageNum.className = `page-num ${i === page ? 'active' : ''}`;
          pageNum.innerText = i;
          pageNum.addEventListener("click", () => {
            goToPage(i);
          });
          container.appendChild(pageNum);
        }

        // Next button (Left arrow in RTL)
        const nextBtn = document.createElement("button");
        nextBtn.className = `page-btn ${page === totalPages ? 'disabled' : ''}`;
        nextBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
        nextBtn.addEventListener("click", () => {
          if (page < totalPages) {
            goToPage(page + 1);
          }
        });
        container.appendChild(nextBtn);
      }

      function goToPage(page) {
        currentPage = page;
        window.location.hash = `page-${page}`;
        renderInvestigations(page);
        renderPagination(page);

        // Scroll to top of grid
        window.scrollTo({
          top: document.querySelector(".investigations-page").offsetTop - 40,
          behavior: "smooth"
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderComponents("nav-investigations");

        const initialPage = getPageFromHash();
        const totalPages = Math.ceil(investigations.length / CARDS_PER_PAGE);
        currentPage = initialPage >= 1 && initialPage <= totalPages ? initialPage : 1;

        renderInvestigations(currentPage);
        renderPagination(currentPage);

        window.addEventListener("hashchange", () => {
          const page = getPageFromHash();
          if (page !== currentPage && page >= 1 && page <= totalPages) {
            currentPage = page;
            renderInvestigations(page);
            renderPagination(page);
          }
        });
      });
    </script>
